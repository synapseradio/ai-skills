<!--
name: Bar Chart (D3) — known good fixture
description: Standalone D3 bar chart, fully wired for render-inference checks
chart-type: bar-chart
engine: d3
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Electronics leads product sales at $42.5K</title>
    <style>
      .bar:focus {
        outline: 2px solid #1c7ed6;
        outline-offset: 1px;
      }
    </style>
  </head>
  <body>
    <div id="chart-container">
      <h1>Electronics leads product sales at $42.5K</h1>
      <svg id="chart" role="img" aria-labelledby="chart-title chart-desc">
        <title id="chart-title">Electronics leads product sales at $42.5K</title>
        <desc id="chart-desc">Bar chart comparing product sales across categories.</desc>
      </svg>
      <details>
        <summary>View data table</summary>
        <div id="data-table"></div>
      </details>
    </div>

    <script type="module">
      import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

      const data = [
        { category: "Electronics", value: 42500 },
        { category: "Clothing", value: 38200 },
        { category: "Books", value: 28400 },
      ];

      const svg = d3.select("#chart").attr("viewBox", "0 0 600 400");
      const g = svg.append("g");

      const bars = g
        .selectAll(".bar")
        .data(data)
        .join("rect")
        .attr("class", "bar")
        .attr("tabindex", 0)
        .attr("role", "listitem")
        .attr("aria-label", (d) => `${d.category}: ${d.value}`)
        .on("pointerenter", function () {})
        .on("focus", function () {});

      svg.on("keydown", function () {});
    </script>
  </body>
</html>
