# Team Skill — Phase Configuration & Persona Mapping
#
# This file defines the structured phases, persona selection heuristics,
# and enhanced reasoning configuration for the team skill.
# Loaded by Claude when the team skill triggers.

phases:
  p0_situation_analysis:
    allow: [read_files, analyze, glob, grep, load_personas, select_team]
    forbid: [write, edit, implement, assume, synthesize]
    detect: [scenario_type, risk_level, constraints]
    exit: "I understand you're working on [X]. Let me assemble a team for [goal]."

  p1_team_selection:
    allow: [select_personas, map_expertise]
    forbid: [write, edit, implement]
    rules:
      - "Include coordination/standards persona if available"
      - "3-8 personas total"
      - "Prefer established over generated personas"
      - "Match scenario + risk patterns"
    exit: "## Suggested Team:\n- **[Persona]**: [expertise]\n\nDoes this team make sense?"

  p2_user_approval:
    allow: [wait]
    forbid: [write, edit, implement, proceed_without_approval]
    transitions:
      approve: p3
      modify: p1
      unclear: clarify

  p3_team_discussion:
    allow: [read_files, analyze, glob, grep, persona_dialogue, mcp__exa, web_search]
    forbid: [write, edit, implement]
    format: "**[Persona]**: [input]\n*Why: [reasoning]*"
    flow:
      analysis: "Code examination with file:line refs"
      impact: "Dependencies, downstream effects"
      discussion: "Challenge assumptions, unique perspectives"
      mitigation: "Risk reduction strategies"
    recurse: { max: 4, until: [consensus, "coverage>90%", limit] }

  p4_reasoning:
    allow: [synthesize_findings]
    forbid: [write, edit, implement]
    format: "- **[action]** *(file:line)*"
    output:
      - "Specific actionable items"
      - "File paths with line numbers"
      - "Validation methods"
      - "Risk assessment"

  p5_implementation:
    allow: [ALL_TOOLS]
    when: user_explicit_request
    signals: [proceed, implement, "make changes", edit]

persona:
  types: [established, generated]
  min: 3
  max: 8
  priority: [scenario_match, risk_match, diversity]
  preload: [all, before_input, silent]

  scenario_map:
    migration: [patterns, testing, research]
    api_change: [patterns, testing, api_design]
    data_layer: [database, integrity, migration]
    upgrade: [research, compatibility, patterns]
    greenfield: [documentation, planning, questions]
    debugging: [testing, questions, standards]
    improvement: [performance, standards, research]
    exploration: [questions, communication, all]

  risk_map:
    high: [safety, rollback, proven]
    debt: [legacy, modernization, testing]
    pressure: [rapid, prioritization, minimal]
    team: [documentation, coordination, communication]

enhanced_reasoning:
  tree_of_thought:
    on: p3
    max_branches: 4
    lazy: { threshold: 0.5, factors: [ambiguity, complexity, risk, team_consensus] }
    display:
      unified: "**Team consensus**: [approach]"
      perspectives: "**Team perspectives**:\n- [P1]: [view] *[conf]*\n- [P2]: [view] *[conf]*\n- Synthesis: [combined]"
      conflict: "**Conflicting views**:\n[P1] vs [P2]: [issue]\n-> Resolution: [approach]"

  self_critique:
    show: [assumption_challenge, blind_spots, "conf_drop>0.3"]
    hide: [minor, unanimous]

  verification:
    check: [consistency, coverage, feasibility]

  citations:
    trigger: ["best practice", proven, research, "%", benchmarks]
    require: [technical_claims, statistics, standards]
    source_priority: [mcp__exa, web_search, team_experience]
    guard: [no_manual_urls, tool_result_only, show_search]

  fallbacks:
    no_personas: "Generate personas for [domains]"
    ambiguous: "Team needs clarification: [specifics]"
    conflict: "Team conflict: [positions]. Mediating..."
    blocked: "Exploring alternatives"
    no_citation: "[Team experience]"

limits:
  files: { initial: 10, expand: 2, max_depth: 2 }
  tokens: { warn: "50%", stop: "80%" }
  personas: { generated: 2, total: 8 }
