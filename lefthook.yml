pre-commit:
  jobs:
    - name: lint
      group:
        parallel: true
        jobs:
          - name: markdownlint
            glob: "*.md"
            run: bun run lint:fix:md {staged_files}
            stage_fixed: true
            skip_empty: true
          - name: biome
            glob: "*.json"
            run: bunx biome check --write {staged_files}
            stage_fixed: true
            skip_empty: true
          - name: prettier-html
            glob: "*.html"
            run: bunx prettier --write {staged_files}
            stage_fixed: true
            skip_empty: true
          - name: prettier-yaml
            glob: "*.{yml,yaml}"
            run: bunx prettier --write {staged_files}
            stage_fixed: true
            skip_empty: true
          - name: ruff
            glob: "*.py"
            run: ruff check --fix {staged_files} && ruff format {staged_files}
            stage_fixed: true
            skip_empty: true
          - name: shellcheck
            glob: "*.sh"
            run: shellcheck {staged_files}
            skip_empty: true

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}
